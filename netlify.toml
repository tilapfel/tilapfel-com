[build]
  publish = "."
  functions = "netlify/functions"

# Maintenance mode: shows maintenance.html (with a real 503 status, so search
# engines know it's temporary) instead of the app. Scoped to just "/" since
# the whole app is one hash-routed page loaded from index.html — every
# visible route lives under that same "/", so nothing else needs excluding.
# /admin/*, /api/*, and all asset paths are untouched by this rule.
# To turn maintenance mode off again: delete or comment out this block.
[[redirects]]
  from = "/"
  to = "/maintenance.html"
  status = 503
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"

# The admin dashboard is self-built (same script-src 'self' as the rest of
# the site — no CDN, no eval) but talks to GitHub's Contents API directly
# from the browser, which the site-wide connect-src doesn't allow. Netlify
# applies the more specific path's header value here, not a merge —
# verified against the live deploy when this block was first added.
[[headers]]
  for = "/admin/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://avatars.githubusercontent.com; font-src 'self'; connect-src 'self' https://api.github.com; base-uri 'self'; object-src 'none'; frame-ancestors 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
