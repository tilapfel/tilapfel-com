backend:
  name: github
  repo: tilapfel/tilapfel-com
  branch: main
  base_url: https://fastidious-sopapillas-de2ab9.netlify.app
  auth_endpoint: /api/auth

publish_mode: simple
media_folder: 'assets/uploads'
public_folder: '/assets/uploads'

locale: 'de'

collections:
  - name: 'content_de'
    label: 'Inhalte (Deutsch)'
    files:
      - name: 'de'
        label: 'Deutsche Inhalte'
        file: 'content/de.json'
        fields:
          - label: 'Projekte'
            name: 'portfolio'
            widget: 'list'
            summary: '{{title}} ({{date}})'
            fields:
              - {
                  label: 'Tag (URL-Baustein)',
                  name: 'tagSlug',
                  widget: 'string',
                  hint: 'Bildet zusammen mit Datum die Web-Adresse dieses Eintrags. Muss zusammen mit dem Datum eindeutig sein — nicht doppelt vergeben.',
                }
              - {
                  label: 'Datum (URL-Baustein)',
                  name: 'dateSlug',
                  widget: 'string',
                  hint: 'Kurzform, z. B. 2026 oder 2026-07-22. Muss zusammen mit dem Tag eindeutig sein.',
                }
              - { label: 'Zeitraum (Anzeigetext)', name: 'date', widget: 'string' }
              - { label: 'Kategorie', name: 'category', widget: 'string' }
              - { label: 'Ort', name: 'location', widget: 'string' }
              - { label: 'Titel', name: 'title', widget: 'string' }
              - { label: 'Kurzbeschreibung', name: 'short', widget: 'text' }
              - { label: 'Ausführliche Beschreibung', name: 'full', widget: 'text' }
              - { label: 'Vorgehen', name: 'approach', widget: 'text' }
          - label: 'Kommende Termine'
            name: 'termine'
            widget: 'list'
            summary: '{{title}} ({{date}})'
            fields:
              - {
                  label: 'Tag (URL-Baustein)',
                  name: 'tagSlug',
                  widget: 'string',
                  hint: 'Bildet zusammen mit Datum die Web-Adresse dieses Termins. Muss eindeutig sein.',
                }
              - {
                  label: 'Datum (URL-Baustein)',
                  name: 'dateSlug',
                  widget: 'string',
                  hint: 'Format JJJJ-MM-TT, z. B. 2026-07-22. Muss zusammen mit dem Tag eindeutig sein.',
                }
              - { label: 'Datum (Anzeigetext)', name: 'date', widget: 'string' }
              - { label: 'Kategorie', name: 'category', widget: 'string' }
              - { label: 'Titel', name: 'title', widget: 'string' }
              - { label: 'Ort', name: 'location', widget: 'string' }
              - { label: 'Details', name: 'detail', widget: 'text' }
              - { label: 'Zusatzinfo', name: 'info', widget: 'text' }
          - label: 'Vergangene Termine'
            name: 'pastTermine'
            widget: 'list'
            summary: '{{title}} ({{date}})'
            fields:
              - { label: 'Datum (Anzeigetext)', name: 'date', widget: 'string' }
              - { label: 'Kategorie', name: 'category', widget: 'string' }
              - { label: 'Titel', name: 'title', widget: 'string' }
              - { label: 'Ort', name: 'location', widget: 'string' }
          - label: 'Library'
            name: 'library'
            widget: 'list'
            summary: '{{title}}'
            fields:
              - {
                  label: 'Slug (URL-Baustein)',
                  name: 'slug',
                  widget: 'string',
                  hint: 'Bildet die Web-Adresse dieses Eintrags. Muss eindeutig sein.',
                }
              - { label: 'Typ', name: 'type', widget: 'string' }
              - { label: 'Titel', name: 'title', widget: 'string' }
              - { label: 'Beschreibung', name: 'desc', widget: 'text' }
          - label: 'Presse'
            name: 'press'
            widget: 'list'
            summary: '{{title}}'
            fields:
              - { label: 'Medium', name: 'outlet', widget: 'string' }
              - { label: 'Datum', name: 'date', widget: 'string' }
              - { label: 'Titel', name: 'title', widget: 'string' }
          - label: 'Feed-Beiträge'
            name: 'feedsPosts'
            widget: 'list'
            summary: '{{title}} ({{date}})'
            fields:
              - {
                  label: 'Format (URL-Baustein)',
                  name: 'formatSlug',
                  widget: 'string',
                  hint: 'Bildet zusammen mit Datum die Web-Adresse dieses Beitrags. Muss eindeutig sein.',
                }
              - {
                  label: 'Datum (URL-Baustein)',
                  name: 'dateSlug',
                  widget: 'string',
                  hint: 'Format JJJJ-MM, z. B. 2026-06. Muss zusammen mit dem Format eindeutig sein.',
                }
              - { label: 'Datum (Anzeigetext)', name: 'date', widget: 'string' }
              - { label: 'Quelle', name: 'source', widget: 'string' }
              - { label: 'Themen-Tags', name: 'tags', widget: 'list' }
              - { label: 'Titel', name: 'title', widget: 'string' }
              - { label: 'Beschreibung', name: 'desc', widget: 'text' }

  - name: 'content_en'
    label: 'Content (English)'
    files:
      - name: 'en'
        label: 'English content'
        file: 'content/en.json'
        fields:
          - label: 'Projects'
            name: 'portfolio'
            widget: 'list'
            summary: '{{title}} ({{date}})'
            fields:
              - {
                  label: 'Tag (URL segment)',
                  name: 'tagSlug',
                  widget: 'string',
                  hint: "Forms this entry's URL together with the date. Must be unique together with the date.",
                }
              - {
                  label: 'Date (URL segment)',
                  name: 'dateSlug',
                  widget: 'string',
                  hint: 'Short form, e.g. 2026 or 2026-07-22. Must be unique together with the tag.',
                }
              - { label: 'Period (display text)', name: 'date', widget: 'string' }
              - { label: 'Category', name: 'category', widget: 'string' }
              - { label: 'Location', name: 'location', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Short description', name: 'short', widget: 'text' }
              - { label: 'Full description', name: 'full', widget: 'text' }
              - { label: 'Approach', name: 'approach', widget: 'text' }
          - label: 'Upcoming Events'
            name: 'termine'
            widget: 'list'
            summary: '{{title}} ({{date}})'
            fields:
              - {
                  label: 'Tag (URL segment)',
                  name: 'tagSlug',
                  widget: 'string',
                  hint: "Forms this event's URL together with the date. Must be unique.",
                }
              - {
                  label: 'Date (URL segment)',
                  name: 'dateSlug',
                  widget: 'string',
                  hint: 'Format YYYY-MM-DD, e.g. 2026-07-22. Must be unique together with the tag.',
                }
              - { label: 'Date (display text)', name: 'date', widget: 'string' }
              - { label: 'Category', name: 'category', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Location', name: 'location', widget: 'string' }
              - { label: 'Details', name: 'detail', widget: 'text' }
              - { label: 'Extra info', name: 'info', widget: 'text' }
          - label: 'Past Events'
            name: 'pastTermine'
            widget: 'list'
            summary: '{{title}} ({{date}})'
            fields:
              - { label: 'Date (display text)', name: 'date', widget: 'string' }
              - { label: 'Category', name: 'category', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Location', name: 'location', widget: 'string' }
          - label: 'Library'
            name: 'library'
            widget: 'list'
            summary: '{{title}}'
            fields:
              - {
                  label: 'Slug (URL segment)',
                  name: 'slug',
                  widget: 'string',
                  hint: "Forms this entry's URL. Must be unique.",
                }
              - { label: 'Type', name: 'type', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'desc', widget: 'text' }
          - label: 'Press'
            name: 'press'
            widget: 'list'
            summary: '{{title}}'
            fields:
              - { label: 'Outlet', name: 'outlet', widget: 'string' }
              - { label: 'Date', name: 'date', widget: 'string' }
              - { label: 'Title', name: 'title', widget: 'string' }
          - label: 'Feed Posts'
            name: 'feedsPosts'
            widget: 'list'
            summary: '{{title}} ({{date}})'
            fields:
              - {
                  label: 'Format (URL segment)',
                  name: 'formatSlug',
                  widget: 'string',
                  hint: "Forms this post's URL together with the date. Must be unique.",
                }
              - {
                  label: 'Date (URL segment)',
                  name: 'dateSlug',
                  widget: 'string',
                  hint: 'Format YYYY-MM, e.g. 2026-06. Must be unique together with the format.',
                }
              - { label: 'Date (display text)', name: 'date', widget: 'string' }
              - { label: 'Source', name: 'source', widget: 'string' }
              - { label: 'Topic tags', name: 'tags', widget: 'list' }
              - { label: 'Title', name: 'title', widget: 'string' }
              - { label: 'Description', name: 'desc', widget: 'text' }
